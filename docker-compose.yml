version: '3'

services:
    rsshub:
        image: diygod/rsshub:latest
        restart: always
        ports:
            # Replace with your Tailscale IP or use 127.0.0.1 for local-only
            - "127.0.0.1:1200:1200"
        environment:
            NODE_ENV: production
            CACHE_TYPE: redis
            REDIS_URL: 'redis://redis:6379/'
            PUPPETEER_WS_ENDPOINT: 'ws://browserless:3000'
        depends_on:
            - redis
            - browserless

    browserless:
        image: browserless/chrome:latest
        restart: always
        ulimits:
            core:
                hard: 0
                soft: 0

    redis:
        image: redis:alpine
        restart: always
        volumes:
            - redis-data:/data

    mongodb:
        image: mongo:latest
        restart: always
        environment:
            # Change user name and password and keep it in sync with MONGODB_URL in .env
            MONGO_INITDB_ROOT_USERNAME: your_username
            MONGO_INITDB_ROOT_PASSWORD: your_strong_password
        ports:
            - "127.0.0.1:27017:27017"
        volumes:
            - mongodb-data:/data/db

    mongo-express:
        image: mongo-express:latest
        restart: always
        ports:
            - "127.0.0.1:8081:8081"
        environment:
            ME_CONFIG_MONGODB_ADMINUSERNAME: your_username
            ME_CONFIG_MONGODB_ADMINPASSWORD: your_strong_password
            ME_CONFIG_MONGODB_URL: mongodb://your_username:your_strong_password@mongodb:27017/
            ME_CONFIG_BASICAUTH_USERNAME: admin
            ME_CONFIG_BASICAUTH_PASSWORD: password
        depends_on:
            - mongodb

volumes:
    redis-data:
    mongodb-data:
