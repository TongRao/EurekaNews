version: '3'

services:
    rsshub:
        image: diygod/rsshub:latest
        restart: always
        ports:
            # Replace with your Tailscale IP or use 127.0.0.1 for local-only
            - "127.0.0.1:1200:1200"
        environment:
            NODE_ENV: production
            CACHE_TYPE: redis
            REDIS_URL: 'redis://redis:6379/'
            PUPPETEER_WS_ENDPOINT: 'ws://browserless:3000'
        depends_on:
            - redis
            - browserless

    browserless:
        image: browserless/chrome:latest
        restart: always
        ulimits:
            core:
                hard: 0
                soft: 0

    redis:
        image: redis:alpine
        restart: always
        volumes:
            - redis-data:/data

    mongodb:
        image: mongo:latest
        restart: always
        environment:
            MONGO_INITDB_ROOT_USERNAME: ai_admin
            # Change this password and keep it in sync with MONGODB_URL in .env
            MONGO_INITDB_ROOT_PASSWORD: your_strong_password_2026
        ports:
            - "127.0.0.1:27017:27017"
        volumes:
            - mongodb-data:/data/db

volumes:
    redis-data:
    mongodb-data:
